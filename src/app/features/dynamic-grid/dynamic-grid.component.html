<div class="grid-header-elite">
    <div class="header-left">
        <button mat-icon-button (click)="goBack()" title="Retour" class="back-btn-elite">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <div class="title-group">
            <div class="subtitle-nexus">GESTION DES DONNÉES</div>
            <h2>{{ tableName }}</h2>
        </div>
    </div>

    <div class="nexus-actions">
        <mat-form-field appearance="outline" class="search-nexus">
            <mat-icon matPrefix>search</mat-icon>
            <mat-label>Filtrer les enregistrements...</mat-label>
            <input matInput (keyup)="applyFilter($event)">
        </mat-form-field>

        <div class="button-group-premium">
            <button mat-stroked-button (click)="fileInput.click()" class="btn-outline">
                <mat-icon>cloud_upload</mat-icon> IMPORTER
            </button>
            <input hidden type="file" #fileInput (change)="importExcel($event)" accept=".xlsx, .xls, .csv">

            <button mat-raised-button color="warn" (click)="deleteAll()" class="btn-danger">
                <mat-icon>auto_delete</mat-icon> VIDER
            </button>

            <button mat-raised-button color="primary" (click)="addRow()" class="btn-nexus">
                <mat-icon>add</mat-icon> AJOUTER
            </button>
        </div>
    </div>
</div>

<mat-card *ngIf="loading">
    <mat-card-content>Chargement des données...</mat-card-content>
</mat-card>

<mat-card class="table-container" [class.hidden]="loading">
    <div class="table-scroll">
        <table mat-table [dataSource]="dataSource" matSort>

            <ng-container *ngFor="let col of columns" [matColumnDef]="col.name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                    {{ col.name }}
                    <mat-icon *ngIf="col.primaryKey" style="font-size: 14px; color: #f59e0b; margin-left: 4px;"
                        title="Clé Primaire">vpn_key</mat-icon>
                </th>
                <td mat-cell *matCellDef="let element; let i = index">

                    <span *ngIf="editingRowIndex !== i">{{ element[col.name] }}</span>

                    <mat-form-field *ngIf="editingRowIndex === i" appearance="fill" class="edit-input">
                        <input matInput [(ngModel)]="editingRowData[col.name]" [disabled]="col.primaryKey && !isNewRow">
                    </mat-form-field>

                </td>
            </ng-container>

            <ng-container matColumnDef="actions" stickyEnd>
                <th mat-header-cell *matHeaderCellDef style="text-align: right;">Actions</th>
                <td mat-cell *matCellDef="let element; let i = index" style="text-align: right;">

                    <div *ngIf="editingRowIndex !== i">
                        <button mat-icon-button color="primary" (click)="startEdit(i, element)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteRow(element)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>

                    <div *ngIf="editingRowIndex === i">
                        <button mat-icon-button color="accent" (click)="saveEdit(i, element)">
                            <mat-icon>check</mat-icon>
                        </button>
                        <button mat-icon-button (click)="cancelEdit()">
                            <mat-icon>close</mat-icon>
                        </button>
                    </div>

                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="100%" style="text-align: center; padding: 24px;">
                    Aucune donnée à afficher ou table vide.
                </td>
            </tr>
        </table>
    </div>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</mat-card>

<div class="grid-header">
    <h2>Gestion des données : {{ tableName }}</h2>
    <div class="actions">
        <mat-form-field appearance="outline" class="search-input">
            <mat-label>Rechercher...</mat-label>
            <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Test">
            <mat-icon matSuffix>search</mat-icon>
        </mat-form-field>
        <button mat-raised-button color="accent" (click)="addRow()">
            <mat-icon>add</mat-icon> Ajouter Ligne
        </button>
    </div>
</div>

<mat-card *ngIf="loading">
    <mat-card-content>Chargement des données...</mat-card-content>
</mat-card>

<mat-card class="table-container" [class.hidden]="loading">
    <div class="table-scroll">
        <table mat-table [dataSource]="dataSource" matSort>

            <!-- Dynamic Columns -->
            <ng-container *ngFor="let col of columns" [matColumnDef]="col.name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>
                    {{ col.name }}
                    <mat-icon *ngIf="col.primaryKey" style="font-size: 14px; color: #f59e0b; margin-left: 4px;"
                        title="Clé Primaire">vpn_key</mat-icon>
                </th>
                <td mat-cell *matCellDef="let element; let i = index">

                    <!-- Normal View -->
                    <span *ngIf="editingRowIndex !== i">{{ element[col.name] }}</span>

                    <!-- Edit View -->
                    <mat-form-field *ngIf="editingRowIndex === i" appearance="fill" class="edit-input">
                        <input matInput [(ngModel)]="editingRowData[col.name]" [disabled]="col.primaryKey && !isNewRow">
                    </mat-form-field>

                </td>
            </ng-container>

            <!-- Actions Column -->
            <ng-container matColumnDef="actions" stickyEnd>
                <th mat-header-cell *matHeaderCellDef style="text-align: right;">Actions</th>
                <td mat-cell *matCellDef="let element; let i = index" style="text-align: right;">

                    <!-- Normal Buttons -->
                    <div *ngIf="editingRowIndex !== i">
                        <button mat-icon-button color="primary" (click)="startEdit(i, element)">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteRow(element)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>

                    <!-- Edit Buttons -->
                    <div *ngIf="editingRowIndex === i">
                        <button mat-icon-button color="accent" (click)="saveEdit(i, element)">
                            <mat-icon>check</mat-icon>
                        </button>
                        <button mat-icon-button (click)="cancelEdit()">
                            <mat-icon>close</mat-icon>
                        </button>
                    </div>

                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <!-- No data -->
            <tr class="mat-row" *matNoDataRow>
                <td class="mat-cell" colspan="100%" style="text-align: center; padding: 24px;">
                    Aucune donnée à afficher ou table vide.
                </td>
            </tr>
        </table>
    </div>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
</mat-card>

<div class="dashboard-header">
    <h2>Aperçu des Tables (Oracle)</h2>
    <button mat-raised-button color="primary" routerLink="/schema-manager">
        <mat-icon>add</mat-icon> Nouvelle Table
    </button>
</div>

<mat-card *ngIf="loading">
    <mat-card-content>Chargement des tables...</mat-card-content>
</mat-card>

<div class="tables-grid" *ngIf="!loading">
    <mat-card *ngFor="let table of tables" class="table-card">
        <mat-card-header>
            <mat-card-title>{{ table.TABLE_NAME }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
            <p style="margin-top: 10px; color: #64748b;">
                Gérez les données de cette table dynamique (CRUD complet supporté).
            </p>
        </mat-card-content>
        <mat-card-actions>
            <button mat-button color="primary" [routerLink]="['/table', table.TABLE_NAME]">Ouvrir Grid</button>
        </mat-card-actions>
    </mat-card>
</div>

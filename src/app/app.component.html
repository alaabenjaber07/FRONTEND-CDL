<div class="app-container">
  <mat-toolbar class="main-toolbar">
    <div class="logo-group" routerLink="/dashboard">
      <div class="bank-logo-container">
        <img *ngIf="!logoError" src="assets/attijari-logo.png" alt="Attijari Bank" class="bank-logo-img"
          (error)="handleLogoError()">
        <mat-icon *ngIf="logoError" class="brand-icon-fallback">account_balance</mat-icon>
      </div>
      <span class="logo-text">CDL</span>
    </div>

    <div class="nav-links">
      <button mat-button routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
        class="nav-item">
        <mat-icon>dashboard</mat-icon> DASHBOARD
      </button>
      <button mat-button routerLink="/query-executor" routerLinkActive="active" class="nav-item">
        <mat-icon>bolt</mat-icon> LANCEMENT CDL
      </button>
      <button mat-button routerLink="/monitoring" routerLinkActive="active" class="nav-item">
        <mat-icon>assessment</mat-icon> MONITORING
      </button>

      <ng-container *ngIf="authService.isAdmin()">
        <button mat-button routerLink="/query-config-manager" routerLinkActive="active" class="nav-item">
          <mat-icon>tune</mat-icon> CONFIG
        </button>
        <button mat-button routerLink="/audit" routerLinkActive="active" class="nav-item">
          <mat-icon>security</mat-icon> AUDIT
        </button>
        <button mat-button routerLink="/schema-manager" routerLinkActive="active" class="nav-item">
          <mat-icon>add_box</mat-icon> TABLES
        </button>
        <button mat-button *ngIf="authService.isSuperAdmin()" routerLink="/user-management" routerLinkActive="active"
          class="nav-item admin-pulse">
          <mat-icon>manage_accounts</mat-icon> UTILISATEURS
        </button>
      </ng-container>
    </div>

    <div class="mini-progress-zone" *ngIf="executionState?.isExecuting" routerLink="/monitoring"
      title="Traitement CDL en cours">
      <div class="mini-stats">
        <span class="mini-label">CDL : {{ executionState?.progress }}%</span>
      </div>
      <div class="mini-progress-track">
        <div class="mini-progress-fill shimmer" [style.width.%]="executionState?.progress"></div>
      </div>
    </div>

    <span class="spacer"></span>

    <div class="user-node" *ngIf="authService.isLoggedIn()">
      <mat-icon>account_circle</mat-icon>
      <div class="user-info-text">
        <span class="username-label">{{ authService.getCurrentUser()?.username }}</span>
        <!-- Affichage du rôle seulement s'il est différent du nom d'utilisateur -->
        <span class="role-tag"
          *ngIf="authService.getCurrentUser()?.username.toLowerCase() !== (authService.isAdmin() ? 'admin' : 'user')">
          {{ authService.isSuperAdmin() ? 'SUPER ADMIN' : (authService.isAdmin() ? 'ADMIN' : 'USER') }}
        </span>
      </div>
      <button mat-icon-button (click)="logout()" title="Déconnexion" class="logout-btn">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </mat-toolbar>

  <main class="main-container">
    <router-outlet></router-outlet>
  </main>
</div>
